<!DOCTYPE html>
<html>
<head>
<title>No Distractions</title>

<style>

/* background */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at center, #111 0%, #000 100%);
}

/* main card */
.container {
  width: 60%;
  max-width: 700px;
  padding: 50px 40px;
  border-radius: 20px;

  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(102,224,255,0.5);

  /* stronger glowing panel */
  box-shadow:
    0 0 20px rgba(102,224,255,0.3),
    0 0 60px rgba(102,224,255,0.15);

  text-align: center;
  color: #66e0ff;
}

/* paragraphs */
p {
  margin: 20px 0;
  line-height: 1.6;

  /* TEXT GLOW */
  text-shadow:
    0 0 6px rgba(102,224,255,0.8),
    0 0 18px rgba(102,224,255,0.6),
    0 0 30px rgba(102,224,255,0.4);
}

/* sizes */
.first {
  font-size: 2.9rem;
  font-weight: bold;
  letter-spacing: 2px;
}

.second {
  font-size: 1.7rem;
  font-weight: bold;
}

.third {
  font-size: 1.5rem;
  opacity: 0.95;
}

</style>
</head>

<body>

<div class="container">

<p class="first">ITS TIME TO FINISH WHAT I STARTED🗿
</p>

<p class="second">
Lock in Bro, It is just about 2-3 months and you know pain later tips to pleasure
</p>

<p class="third">
If this is your break, take a walk instead🌿.
</p>
  
  <!-- SCARY POPUP -->
<div id="popup">
  <div id="popupBox">
    <h1>👀 I SEE YOU</h1>
    <button onclick="closePopup()">OK</button>
  </div>
</div>

<style>
/* Full dark screen */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Popup box */
#popupBox {
  background: #111;
  padding: 50px;
  border-radius: 15px;
  text-align: center;
  border: 3px solid red;
  box-shadow: 0 0 30px red;
  animation: shake 0.3s infinite;
}

/* Big scary text */
#popupBox h1 {
  font-size: 90px;
  color: red;
  text-shadow: 0 0 20px red;
}

/* Button */
button {
  font-size: 20px;
  padding: 10px 25px;
  margin-top: 20px;
  cursor: pointer;
}

/* Shake animation */
@keyframes shake {
  0% { transform: translate(1px, 1px); }
  25% { transform: translate(-2px, 1px); }
  50% { transform: translate(1px, -2px); }
  75% { transform: translate(-1px, -1px); }
  100% { transform: translate(1px, 1px); }
}
</style>

<script>
let popup = document.getElementById("popup");
let timer = null;

function closePopup() {
  popup.style.display = "none";

  if (timer) clearTimeout(timer);

  timer = setTimeout(() => {
    popup.style.display = "flex";
  }, 20000); // 25 seconds
}
</script>

</body>
</html>
